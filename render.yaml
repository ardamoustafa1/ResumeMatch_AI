services:
  - type: web
    name: networkforge-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic -c backend/db/migrations/alembic.ini upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: networkforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: networkforge-redis
          property: connectionString

  - type: worker
    name: networkforge-celery
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A backend.tasks.celery_app worker --loglevel=info
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: networkforge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: networkforge-redis
          property: connectionString

databases:
  - name: networkforge-db
    plan: free

  - type: redis
    name: networkforge-redis
    plan: free
