version: '3.8'

services:
  api:
    # No hot reload in production
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    volumes: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '512M'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    volumes: []
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: '1024M'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Disable redis-commander in production
  redis-commander:
    profiles: ["disable"]
