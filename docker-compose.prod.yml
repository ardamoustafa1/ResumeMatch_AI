services:
  api:
    command: >
      sh -c "alembic -c backend/db/migrations/alembic.ini upgrade head &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000
             --workers 2 --proxy-headers"
    volumes: !reset []
    restart: unless-stopped
    environment:
      APP_ENV: production
      SECURE_COOKIES: "true"
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required in production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required in production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required in production}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  frontend:
    command: node server.js
    volumes: !reset []
    restart: unless-stopped
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  worker:
    volumes: !reset []
    restart: unless-stopped
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required in production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required in production}
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M

  postgres:
    restart: unless-stopped
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in production}

  redis:
    restart: unless-stopped
    ports: !reset []

  redis-commander:
    profiles: ["disabled"]
