name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: CodeQL Initialization
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v3
      - name: Install Python Security Tools
        run: pip install pip-audit bandit
      - name: Run pip-audit
        run: pip-audit -r requirements.txt
      - name: Run Bandit (SAST)
        run: bandit -r backend -c backend/pyproject.toml
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resumematch_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d resumematch_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --upgrade pip && pip install -r requirements-dev.txt
      - run: ruff check backend tests register_user.py setup_mock_user.py
      - run: ruff format --check backend tests register_user.py setup_mock_user.py
      - run: mypy backend
      - name: Validate migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/resumematch_test
        run: alembic -c backend/db/migrations/alembic.ini upgrade head
      - name: Test backend
        env:
          APP_ENV: test
          SECRET_KEY: ci-test-secret-key-with-at-least-32-characters
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/resumematch_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest --cov=backend --cov-report=term-missing --cov-fail-under=55

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - run: npm run build
      - run: npm run test:e2e
      - run: npm audit --omit=dev --audit-level=high
      - name: Validate extension scripts
        working-directory: ..
        run: |
          node --check extension/background.js
          node --check extension/content.js
          node --check extension/popup.js

  containers:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build api frontend
      - name: Run Trivy vulnerability scanner on API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'resumematch_ai-api:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  publish-api:
    needs: [backend, frontend, containers]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/api
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
